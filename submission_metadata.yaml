ai_usage_summary: |
  OpenAI Codex was used for bundle analysis, implementation support, code review,
  testing, and documentation. Candidate ranking is deterministic and uses no LLM,
  GPU, network call, or external service. No candidate data is sent to an LLM at
  ranking time.

methodology_summary: |
  HawkesRank is a deterministic two-pass professional-state ranker. Pass 1 streams
  all 100,000 profiles, assigns evidence-bounded career bands, and retains 2,000
  candidates. Pass 2 builds traceable evidence ledgers and reranks using direct
  search/ranking proof, production ownership, evaluation maturity, experience,
  career-corroborated skills, bounded behavior/logistics, hard-negative suppression,
  and narrow multi-signal risk checks. Skills cannot manufacture relevance, broad
  synthetic anomalies remain weak, and behavior can reorder but not redefine a
  candidate's technical band. It runs CPU-only with no network or third-party
  dependencies; the measured full run is approximately 73 seconds and 72 MB RSS.

